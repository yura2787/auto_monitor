services:
  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    restart: always
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A tasks.celery_app worker --concurrency=4 --loglevel=info
    env_file: .env
    restart: always
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file: .env
    restart: always
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A tasks.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    restart: always
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: auto_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
